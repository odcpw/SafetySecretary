name: Secret scan

on:
  push:
  pull_request:

env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  branch-scan:
    name: Gitleaks branch scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pinned gitleaks
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').config.secretScan.gitleaksVersion")"
          if [ "${package_version}" != "${GITLEAKS_VERSION}" ]; then
            echo "::error::package.json pins gitleaks ${package_version}, workflow pins ${GITLEAKS_VERSION}"
            exit 1
          fi
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan full branch tree
        run: gitleaks dir . --config .gitleaks.toml --redact --no-banner

  allow-list-governance:
    name: Allow-list governance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Flag allow-list entries for reviewer sign-off
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          ALLOWLIST_REVIEWED: ${{ contains(github.event.pull_request.labels.*.name, 'secret-scan-allowlist-reviewed') }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${BASE_SHA}"
          if git diff -U0 "${BASE_SHA}"...HEAD -- .gitleaks.toml | grep -E '^\+.*(\[\[?allowlists?\]?|allowlists?\.)'; then
            if [ "${ALLOWLIST_REVIEWED}" = "true" ]; then
              echo "::notice::.gitleaks.toml allow-list change has reviewer sign-off label"
              exit 0
            fi
            echo "::error::.gitleaks.toml allow-list changes require reviewer sign-off and the secret-scan-allowlist-reviewed label"
            exit 1
          fi
          echo "No .gitleaks.toml allow-list additions detected."
