services:
  db:
    image: pgvector/pgvector:pg16
    container_name: safetysecretarynext-db
    environment:
      POSTGRES_USER: safety_secretary
      POSTGRES_PASSWORD: safety_secretary
      POSTGRES_DB: safety_secretary
    ports:
      - "5435:5432"
    volumes:
      - ssfw_next_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety_secretary"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ssfw_next_pg:
