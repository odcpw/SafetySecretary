services:
  db:
    image: pgvector/pgvector:pg16
    container_name: safetysecretarydb
    environment:
      POSTGRES_USER: safetysecretary
      POSTGRES_PASSWORD: safetysecretary
      POSTGRES_DB: safetysecretary
    ports:
      - "5435:5432"
    volumes:
      - safetysecretarypg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetysecretary"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  safetysecretarypg:
